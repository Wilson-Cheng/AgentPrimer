name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel an in-progress run when a new commit lands on the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: ['20.x', '22.x']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # better-sqlite3 ships prebuilt binaries; rebuild only if the architecture
      # we land on doesn't have one (rare on hosted runners but cheap insurance).
      - name: Rebuild native bindings
        run: npm run postinstall

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native bindings
        run: npm run postinstall

      # Compile the production bundle. This catches type errors, bad imports,
      # and Next.js build-time failures that lint and unit tests miss.
      - name: Build
        run: npm run build
        env:
          # next build must never fall back to the public dev secret.
          AGENT_PRIMER_SECRET: ci-build-placeholder-secret
