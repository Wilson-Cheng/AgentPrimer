<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C5CE7"/>
      <stop offset="100%" stop-color="#00B4D8"/>
    </linearGradient>
    <linearGradient id="dotGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD93D"/>
      <stop offset="100%" stop-color="#FF9F43"/>
    </linearGradient>
  </defs>

  <!-- Badge circle -->
  <circle cx="50" cy="50" r="48" fill="url(#brand)"/>
  
  <!-- Stylized "A" — left stroke -->
  <line x1="28" y1="72" x2="50" y2="22" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Stylized "A" — right stroke -->
  <line x1="50" y1="22" x2="72" y2="72" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Crossbar — glowing agent node -->
  <circle cx="50" cy="48" r="6" fill="url(#dotGlow)"/>
  <circle cx="48.5" cy="46.5" r="2" fill="rgba(255,255,255,0.35)"/>
</svg>
