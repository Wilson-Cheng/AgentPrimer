  <text x="42" y="84" font-size="15" font-weight="650" fill="#475569">Separate policy, state, side effects, and experience</text>
  <g filter="url(#shadow)"><line x1="290" y1="215" x2="330" y2="215" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/><text x="310" y="207" text-anchor="middle" font-size="12" font-weight="700" fill="#475569">state</text><line x1="540" y1="215" x2="580" y2="215" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/><text x="560" y="207" text-anchor="middle" font-size="12" font-weight="700" fill="#475569">actions</text><line x1="790" y1="215" x2="830" y2="215" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/><text x="810" y="207" text-anchor="middle" font-size="12" font-weight="700" fill="#475569">visible</text><line x1="185" y1="270" x2="530" y2="390" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/><text x="357.5" y="322" text-anchor="middle" font-size="12" font-weight="700" fill="#475569">policy</text><line x1="435" y1="270" x2="530" y2="390" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/><text x="482.5" y="322" text-anchor="middle" font-size="12" font-weight="700" fill="#475569">context</text><line x1="685" y1="270" x2="530" y2="390" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/><text x="607.5" y="322" text-anchor="middle" font-size="12" font-weight="700" fill="#475569">effects</text><line x1="935" y1="270" x2="530" y2="390" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/><text x="732.5" y="322" text-anchor="middle" font-size="12" font-weight="700" fill="#475569">UX</text><rect x="80" y="160" width="210" height="110" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><text x="185" y="207" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="700" fill="#0f172a">Control plane Prompts,</text><text x="185" y="225" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="700" fill="#0f172a">models, approvals</text><rect x="330" y="160" width="210" height="110" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/><text x="435" y="207" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="700" fill="#0f172a">Data plane Messages,</text><text x="435" y="225" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="700" fill="#0f172a">memory, RAG</text><rect x="580" y="160" width="210" height="110" rx="18" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><text x="685" y="207" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="700" fill="#0f172a">Action plane Tools,</text><text x="685" y="225" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="700" fill="#0f172a">functions, MCP</text><rect x="830" y="160" width="210" height="110" rx="18" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/><text x="935" y="199" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="700" fill="#0f172a">Experience plane</text><text x="935" y="217" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="700" fill="#0f172a">Streaming, previews,</text><text x="935" y="235" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="700" fill="#0f172a">traces</text><rect x="455" y="390" width="210" height="90" rx="18" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/><text x="560" y="427" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="700" fill="#0f172a">Agent runtime</text><text x="560" y="445" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="700" fill="#0f172a">coordinates boundaries</text></g>
</svg>