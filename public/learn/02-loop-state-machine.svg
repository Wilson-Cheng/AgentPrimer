<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" role="img" aria-label="ReAct State Machine">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#eff6ff"/><stop offset="0.55" stop-color="#f8fafc"/><stop offset="1" stop-color="#ecfeff"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker>
  </defs>
  <rect width="1100" height="620" rx="28" fill="url(#bg)"/>
  <circle cx="1010" cy="80" r="130" fill="#93c5fd" opacity="0.18"/>
  <circle cx="80" cy="550" r="120" fill="#34d399" opacity="0.14"/>
  <text x="42" y="54" font-size="28" font-weight="900" fill="#0f172a">ReAct State Machine</text>
  <text x="42" y="84" font-size="15" font-weight="650" fill="#475569">The program bounds model-directed action</text>
  <g filter="url(#shadow)"><line x1="220" y1="285" x2="260" y2="285" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/><line x1="410" y1="270" x2="465" y2="175" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/><text x="437.5" y="214.5" text-anchor="middle" font-size="12" font-weight="700" fill="#475569">stop</text><line x1="410" y1="305" x2="465" y2="380" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/><text x="437.5" y="334.5" text-anchor="middle" font-size="12" font-weight="700" fill="#475569">tool</text><line x1="615" y1="380" x2="660" y2="380" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/><text x="637.5" y="372" text-anchor="middle" font-size="12" font-weight="700" fill="#475569">danger</text><line x1="810" y1="380" x2="855" y2="300" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/><text x="832.5" y="332" text-anchor="middle" font-size="12" font-weight="700" fill="#475569">execute</text><line x1="855" y1="245" x2="145" y2="245" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/><text x="500" y="237" text-anchor="middle" font-size="12" font-weight="700" fill="#475569">next step</text><line x1="735" y1="340" x2="735" y2="205" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/><text x="735" y="264.5" text-anchor="middle" font-size="12" font-weight="700" fill="#475569">deny/limit</text><rect x="70" y="245" width="150" height="80" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><text x="145" y="285" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="700" fill="#0f172a">Build context</text><rect x="260" y="245" width="150" height="80" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/><text x="335" y="285" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="700" fill="#0f172a">Model call</text><rect x="465" y="135" width="150" height="80" rx="18" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><text x="540" y="175" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="700" fill="#0f172a">Final answer</text><rect x="465" y="340" width="150" height="80" rx="18" fill="#fed7aa" stroke="#ea580c" stroke-width="2"/><text x="540" y="380" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="700" fill="#0f172a">Tool call</text><rect x="660" y="340" width="150" height="80" rx="18" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/><text x="735" y="380" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="700" fill="#0f172a">Approval gate</text><rect x="855" y="245" width="150" height="80" rx="18" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/><text x="930" y="285" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="700" fill="#0f172a">Observation</text><rect x="660" y="125" width="150" height="80" rx="18" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/><text x="735" y="165" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="700" fill="#0f172a">Paused / stopped</text></g>
</svg>