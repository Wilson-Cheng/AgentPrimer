  <rect width="1100" height="620" rx="28" fill="url(#bg)"/>
  <circle cx="1010" cy="80" r="130" fill="#93c5fd" opacity="0.18"/>
  <circle cx="80" cy="550" r="120" fill="#34d399" opacity="0.14"/>
  <text x="42" y="54" font-size="28" font-weight="900" fill="#0f172a">Agent Builder Trade-offs</text>
  <text x="42" y="84" font-size="15" font-weight="650" fill="#475569">Different systems optimize for different balances of transparency and generality</text>
  <g filter="url(#shadow)"><rect x="170" y="120" width="760" height="390" rx="22" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/><line x1="550" y1="120" x2="550" y2="510" stroke="#cbd5e1" stroke-width="2"/><line x1="170" y1="315" x2="930" y2="315" stroke="#cbd5e1" stroke-width="2"/><text x="550" y="550" text-anchor="middle" font-size="16" font-weight="800" fill="#334155">Hidden internals → Transparent internals</text><text x="70" y="315" text-anchor="middle" transform="rotate(-90 70 315)" font-size="16" font-weight="800" fill="#334155">Single workflow → General platform</text><rect x="650" y="160" width="190" height="44" rx="999" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/><text x="745" y="182" text-anchor="middle" dominant-baseline="middle" font-size="13" font-weight="800" fill="#0f172a">Teaching platform</text><rect x="270" y="160" width="180" height="44" rx="999" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><text x="360" y="182" text-anchor="middle" dominant-baseline="middle" font-size="13" font-weight="800" fill="#0f172a">Product platform</text><rect x="270" y="420" width="170" height="44" rx="999" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/><text x="355" y="442" text-anchor="middle" dominant-baseline="middle" font-size="13" font-weight="800" fill="#0f172a">Fixed automation</text><rect x="650" y="420" width="160" height="44" rx="999" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><text x="730" y="442" text-anchor="middle" dominant-baseline="middle" font-size="13" font-weight="800" fill="#0f172a">Framework / library</text><circle cx="760" cy="225" r="14" fill="#16a34a"/><text x="782" y="230" font-size="14" font-weight="900" fill="#0f172a">AgentPrimer</text><circle cx="335" cy="430" r="10" fill="#64748b"/><text x="352" y="435" font-size="13" fill="#475569">FixedWorkflow</text><circle cx="305" cy="250" r="10" fill="#2563eb"/><text x="322" y="255" font-size="13" fill="#475569">BlackBoxAssistant</text><circle cx="670" cy="385" r="10" fill="#d97706"/><text x="688" y="390" font-size="13" fill="#475569">AgentFramework</text></g>
