<svg width="1100" height="620" viewBox="0 0 1100 620" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1100" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="0.5" stop-color="#172554"/>
      <stop offset="1" stop-color="#581C87"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="13" markerHeight="13" refX="10" refY="6.5" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L11 6.5L2 11" fill="none" stroke="#DBEAFE" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1100" height="620" rx="34" fill="url(#bg)"/>
  <circle cx="190" cy="520" r="170" fill="#22D3EE" opacity="0.1"/>
  <circle cx="930" cy="100" r="190" fill="#F472B6" opacity="0.12"/>

  <text x="70" y="78" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="900">One AgentPrimer Turn</text>
  <text x="70" y="112" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="18">How a user message becomes streamed tokens, tool events, and a trace</text>

  <g font-family="Inter, Arial, sans-serif">
    <g filter="url(#shadow)">
      <rect x="70" y="180" width="170" height="82" rx="22" fill="#38BDF8"/>
      <text x="155" y="215" text-anchor="middle" fill="#082F49" font-size="20" font-weight="900">1. User</text>
      <text x="155" y="240" text-anchor="middle" fill="#0C4A6E" font-size="14">asks a goal</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="305" y="180" width="170" height="82" rx="22" fill="#A78BFA"/>
      <text x="390" y="215" text-anchor="middle" fill="white" font-size="20" font-weight="900">2. Context</text>
      <text x="390" y="240" text-anchor="middle" fill="#F3E8FF" font-size="14">prompt + tools</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="540" y="180" width="170" height="82" rx="22" fill="#FDE68A"/>
      <text x="625" y="215" text-anchor="middle" fill="#431407" font-size="20" font-weight="900">3. Model</text>
      <text x="625" y="240" text-anchor="middle" fill="#78350F" font-size="14">decides action</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="775" y="180" width="170" height="82" rx="22" fill="#86EFAC"/>
      <text x="860" y="215" text-anchor="middle" fill="#052E16" font-size="20" font-weight="900">4. Tool</text>
      <text x="860" y="240" text-anchor="middle" fill="#14532D" font-size="14">does work</text>
    </g>

    <path d="M240 221H305" stroke="#DBEAFE" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
    <path d="M475 221H540" stroke="#DBEAFE" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
    <path d="M710 221H775" stroke="#DBEAFE" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

    <g filter="url(#shadow)">
      <rect x="775" y="365" width="170" height="82" rx="22" fill="#34D399"/>
      <text x="860" y="400" text-anchor="middle" fill="#052E16" font-size="20" font-weight="900">5. Result</text>
      <text x="860" y="425" text-anchor="middle" fill="#14532D" font-size="14">observation</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="540" y="365" width="170" height="82" rx="22" fill="#FB7185"/>
      <text x="625" y="400" text-anchor="middle" fill="white" font-size="20" font-weight="900">6. Append</text>
      <text x="625" y="425" text-anchor="middle" fill="#FFE4E6" font-size="14">to history</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="305" y="365" width="170" height="82" rx="22" fill="#60A5FA"/>
      <text x="390" y="400" text-anchor="middle" fill="#082F49" font-size="20" font-weight="900">7. Re-call</text>
      <text x="390" y="425" text-anchor="middle" fill="#0C4A6E" font-size="14">LLM again</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="70" y="365" width="170" height="82" rx="22" fill="#F0ABFC"/>
      <text x="155" y="400" text-anchor="middle" fill="#581C87" font-size="20" font-weight="900">8. Stream</text>
      <text x="155" y="425" text-anchor="middle" fill="#701A75" font-size="14">answer + trace</text>
    </g>

    <path d="M860 262V365" stroke="#DBEAFE" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
    <path d="M775 406H710" stroke="#DBEAFE" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
    <path d="M540 406H475" stroke="#DBEAFE" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
    <path d="M305 406H240" stroke="#DBEAFE" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

    <path d="M390 365C390 314 520 305 625 262" stroke="#FDE68A" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 10" marker-end="url(#arrow)"/>
    <text x="508" y="320" text-anchor="middle" fill="#FDE68A" font-size="14" font-weight="800">repeat if more tools are needed</text>
  </g>

  <g transform="translate(70 520)">
    <rect width="960" height="54" rx="18" fill="#020617" opacity="0.62" stroke="#475569"/>
    <text x="24" y="34" fill="#E0F2FE" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">Fun debugging game: open a trace and label each event with the matching step number from this diagram.</text>
  </g>
</svg>
