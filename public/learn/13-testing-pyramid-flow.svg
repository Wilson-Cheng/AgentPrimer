    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker>
  </defs>
  <rect width="1100" height="620" rx="28" fill="url(#bg)"/>
  <circle cx="1010" cy="80" r="130" fill="#93c5fd" opacity="0.18"/>
  <circle cx="80" cy="550" r="120" fill="#34d399" opacity="0.14"/>
